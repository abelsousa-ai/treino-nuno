<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#181B20">
<title>Treino Nuno</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap');

:root{
  --bg:#181B20;
  --bg-soft:#21252C;
  --bg-soft-2:#2B313B;
  --line:#383D47;
  --ink:#F3EFE6;
  --ink-soft:#9499A6;
  --ink-faint:#5C6270;
  --work:#F2A33D;
  --work-soft:#3A2E1C;
  --rest:#4F9E94;
  --rest-soft:#1C2C2A;
  --ok:#7BC67E;
  --warn:#E06458;
  --radius:16px;
  --radius-sm:10px;
  --font-display:'Oswald','Arial Narrow',sans-serif;
  --font-body:'Work Sans',-apple-system,'Segoe UI',Roboto,sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
  min-height:100vh;
}
#app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
}

h1,h2,h3,.label{
  font-family:var(--font-display);
  font-weight:600;
  letter-spacing:.04em;
  margin:0;
}
.eyebrow{
  font-family:var(--font-display);
  font-weight:600;
  font-size:.72rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--ink-soft);
}
p{margin:0;line-height:1.5;}
button{font-family:var(--font-body);border:none;cursor:pointer;}
a{color:inherit;text-decoration:none;}

/* ---------- HEADER ---------- */
.topbar{
  padding:calc(20px + var(--safe-top)) 20px 12px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
}
.topbar h1{font-size:1.6rem;text-transform:uppercase;}
.topbar .date{font-size:.8rem;color:var(--ink-soft);text-transform:capitalize;}

/* ---------- MAIN SCROLL AREA ---------- */
.view{
  flex:1;
  padding:0 20px 100px;
  display:none;
  animation:fade .25s ease;
}
.view.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* ---------- WEEK PROGRESS ---------- */
.week-card{
  background:var(--bg-soft);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px 18px;
  margin-bottom:18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.week-card .wtxt .eyebrow{margin-bottom:4px;}
.week-card .wtxt strong{font-family:var(--font-display);font-size:1.05rem;font-weight:600;}
.week-dots{display:flex;gap:8px;}
.week-dot{
  width:30px;height:30px;border-radius:50%;
  border:2px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:.85rem;font-weight:600;
  color:var(--ink-faint);
}
.week-dot.done{
  background:var(--ok);
  border-color:var(--ok);
  color:#13311a;
}

/* ---------- WORKOUT CARDS ---------- */
.section-title{
  font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--ink-soft);margin:6px 0 12px;
}
.wcard{
  background:var(--bg-soft);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:18px;
  margin-bottom:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
  transition:border-color .15s, transform .1s;
}
.wcard:active{transform:scale(.985);}
.wcard .wcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.wcard h2{font-size:1.25rem;text-transform:uppercase;}
.wcard .wcard-meta{font-size:.78rem;color:var(--ink-soft);}
.wcard .wcard-focus{
  display:flex;flex-wrap:wrap;gap:6px;
}
.tag{
  font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  padding:4px 9px;border-radius:20px;
  background:var(--bg-soft-2);color:var(--ink-soft);
  border:1px solid var(--line);
}
.wcard-foot{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.wcard-last{font-size:.75rem;color:var(--ink-faint);}
.btn{
  font-family:var(--font-display);
  font-weight:600;
  letter-spacing:.06em;
  text-transform:uppercase;
  font-size:.85rem;
  border-radius:12px;
  padding:12px 20px;
  background:var(--work);
  color:#241a08;
  display:inline-flex;align-items:center;gap:8px;
  border:none;
}
.btn:active{filter:brightness(.92);}
.btn.btn-ghost{
  background:transparent;color:var(--ink);border:1px solid var(--line);
}
.btn.btn-block{width:100%;justify-content:center;padding:15px;font-size:.95rem;}
.btn.btn-rest{background:var(--rest);color:#0c2220;}

/* ---------- DETAIL VIEW ---------- */
.detail-head{padding:calc(18px + var(--safe-top)) 0 6px;}
.back-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.icon-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--bg-soft);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  color:var(--ink);flex-shrink:0;
}
.detail-head h1{font-size:1.5rem;text-transform:uppercase;}
.detail-head .sub{font-size:.8rem;color:var(--ink-soft);margin-top:4px;}

.block{margin-bottom:22px;}
.block-head{
  display:flex;align-items:baseline;justify-content:space-between;
  margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line);
}
.block-head h3{font-size:1rem;text-transform:uppercase;}
.block-head .rondas{font-size:.72rem;color:var(--rest);font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
.exline{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 0;font-size:.9rem;border-bottom:1px solid rgba(56,61,71,.45);
  gap:10px;
}
.exline:last-child{border-bottom:none;}
.exline .exname{font-weight:500;}
.exline .exdetail{color:var(--ink-soft);font-size:.82rem;flex-shrink:0;text-align:right;}
.exline-thumb{width:52px;height:48px;border-radius:8px;object-fit:contain;flex-shrink:0;background:var(--ink);}
.exline-info{flex:1;min-width:0;}

.sticky-cta{
  position:sticky;bottom:calc(16px + var(--safe-bottom));
  margin-top:18px;
}

/* ---------- EXEC SCREEN ---------- */
.exec-screen{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;
  background:var(--bg);
  transition:background-color .5s ease;
  max-width:480px;margin:0 auto;
}
.exec-screen.phase-work{background:var(--bg);}
.exec-screen.phase-rest{background:var(--bg);}

.exec-top{
  padding:calc(14px + var(--safe-top)) 18px 10px;
  display:flex;align-items:center;gap:12px;
}
.exec-progress{
  flex:1;height:4px;border-radius:4px;background:var(--bg-soft-2);overflow:hidden;
}
.exec-progress-fill{height:100%;background:var(--work);border-radius:4px;transition:width .3s ease;}
.exec-step-count{font-size:.72rem;color:var(--ink-faint);font-family:var(--font-display);letter-spacing:.05em;}

.exec-body{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 24px;text-align:center;gap:6px;overflow-y:auto;
}
.exec-label{
  font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);
  font-family:var(--font-display);font-weight:600;
}
.exec-name{
  font-size:1.85rem;text-transform:uppercase;line-height:1.15;
  margin:4px 0 10px;
}
.phase-tag{
  font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;font-weight:700;
  font-family:var(--font-display);
  padding:5px 14px;border-radius:20px;margin-bottom:4px;
}
.phase-tag.work{background:var(--work-soft);color:var(--work);}
.phase-tag.rest{background:var(--rest-soft);color:var(--rest);}

/* Ring timer */
.ring-wrap{position:relative;width:min(46vw,185px);height:min(46vw,185px);margin:8px 0;flex-shrink:0;}
.ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--bg-soft-2);stroke-width:10;}
.ring-fg{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s linear, stroke .4s ease;}
.ring-fg.work{stroke:var(--work);}
.ring-fg.rest{stroke:var(--rest);}
.round-marks circle{fill:var(--bg-soft-2);transition:fill .3s ease;}
.round-marks circle.done{fill:var(--ok);}
.round-marks{display:flex;gap:9px;justify-content:center;margin-top:2px;}
.round-marks .dot{width:9px;height:9px;border-radius:50%;background:var(--bg-soft-2);transition:background .3s ease;}
.round-marks .dot.active{background:var(--work);}
.round-marks .dot.active.rest{background:var(--rest);}
.round-marks .dot.done{background:var(--ok);}
.ring-center{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.ring-time{font-family:var(--font-display);font-size:2.4rem;font-weight:700;letter-spacing:.02em;font-variant-numeric:tabular-nums;}
.ring-sub{font-size:.78rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.12em;margin-top:2px;}

/* Reps display */
.reps-wrap{
  width:min(46vw,185px);height:min(46vw,185px);border-radius:50%;
  border:10px solid var(--bg-soft-2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:8px 0;flex-shrink:0;gap:4px;
}
.reps-num{font-family:var(--font-display);font-size:2.4rem;font-weight:700;}
.reps-sub{font-size:.78rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.12em;}

.ex-illustration{
  width:100%;max-width:320px;margin:2px 0 4px;flex-shrink:0;
  background:var(--ink);border-radius:var(--radius);
  padding:8px;display:flex;align-items:center;justify-content:center;
}
.ex-illustration img{width:100%;max-height:170px;object-fit:contain;display:block;}

.video-link{
  display:inline-flex;align-items:center;gap:7px;
  font-size:.82rem;font-weight:600;color:var(--rest);
  padding:6px 4px;margin-top:2px;
}

.note-box{
  margin-top:8px;font-size:.78rem;color:var(--ink-soft);
  background:var(--bg-soft);border:1px solid var(--line);border-radius:10px;
  padding:8px 12px;max-width:320px;
}

.exec-controls{
  padding:14px 18px calc(18px + var(--safe-bottom));
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;
}
.ctrl-btn{
  background:var(--bg-soft);border:1px solid var(--line);color:var(--ink);
  border-radius:12px;padding:14px 6px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  font-size:.7rem;font-family:var(--font-display);letter-spacing:.08em;text-transform:uppercase;font-weight:600;
}
.ctrl-btn:disabled{opacity:.35;}
.ctrl-btn.main{background:var(--work);color:#241a08;border-color:var(--work);}
.ctrl-btn.main.start{animation:pulseStart 1.6s ease-in-out infinite;}
@keyframes pulseStart{0%,100%{box-shadow:0 0 0 0 rgba(242,163,61,.55);}50%{box-shadow:0 0 0 8px rgba(242,163,61,0);}}
.ctrl-btn svg{width:20px;height:20px;}

/* Peso (registo de peso) */
.peso-card{
  margin-top:10px;background:var(--bg-soft);border:1px solid var(--line);
  border-radius:12px;padding:10px 16px;display:flex;flex-direction:column;
  align-items:center;gap:6px;
}
.peso-label{
  font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);
  font-family:var(--font-display);font-weight:600;
}
.peso-row{display:flex;align-items:center;gap:14px;}
.peso-btn{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:var(--bg-soft-2);border:1px solid var(--line);color:var(--ink);
  font-size:1.3rem;font-weight:700;line-height:1;
  display:flex;align-items:center;justify-content:center;
}
.peso-val{display:flex;align-items:baseline;gap:5px;min-width:64px;justify-content:center;}
.peso-val input{
  width:54px;background:transparent;border:none;color:var(--ink);
  font-family:var(--font-display);font-size:1.6rem;font-weight:700;
  text-align:right;font-variant-numeric:tabular-nums;
  -moz-appearance:textfield;
}
.peso-val input::-webkit-outer-spin-button,
.peso-val input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.peso-unit{font-size:.85rem;color:var(--ink-soft);}
.peso-prev{font-size:.75rem;color:var(--ink-soft);}

/* Done/Complete screen */
.done-screen{
  position:fixed;inset:0;z-index:60;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:32px;gap:14px;max-width:480px;margin:0 auto;
}
.done-screen .big-check{
  width:88px;height:88px;border-radius:50%;background:var(--rest-soft);
  display:flex;align-items:center;justify-content:center;color:var(--ok);margin-bottom:6px;
}
.done-screen h1{font-size:1.7rem;text-transform:uppercase;}
.done-stats{display:flex;gap:28px;margin:10px 0 6px;}
.done-stat{display:flex;flex-direction:column;align-items:center;}
.done-stat .v{font-family:var(--font-display);font-size:1.6rem;font-weight:700;}
.done-stat .l{font-size:.68rem;color:var(--ink-soft);letter-spacing:.12em;text-transform:uppercase;margin-top:2px;}

/* ---------- HISTORY ---------- */
.cal-card{
  background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;margin-bottom:18px;
}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-head .lbl{font-family:var(--font-display);font-size:.95rem;text-transform:uppercase;letter-spacing:.06em;}
.cal-nav{display:flex;gap:6px;}
.cal-nav button{
  width:30px;height:30px;border-radius:8px;background:var(--bg-soft-2);border:1px solid var(--line);
  color:var(--ink);display:flex;align-items:center;justify-content:center;
}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;}
.cal-dow{font-size:.65rem;color:var(--ink-faint);letter-spacing:.08em;padding-bottom:4px;}
.cal-day{
  aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:.8rem;color:var(--ink-soft);position:relative;
}
.cal-day.empty{visibility:hidden;}
.cal-day.today{border:1px solid var(--rest);color:var(--ink);}
.cal-day.has-1::after, .cal-day.has-2::after{
  content:'';position:absolute;bottom:4px;width:5px;height:5px;border-radius:50%;background:var(--ok);
}
.cal-day.has-2{background:rgba(123,198,126,.12);}
.cal-day.has-2::after{box-shadow:5px 0 0 var(--ok);}

.stats-row{display:flex;gap:10px;margin-bottom:18px;}
.stat-card{
  flex:1;background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:14px 10px;text-align:center;
}
.stat-card .v{font-family:var(--font-display);font-size:1.5rem;font-weight:700;}
.stat-card .l{font-size:.65rem;color:var(--ink-soft);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}

.hist-list{display:flex;flex-direction:column;gap:8px;}
.hist-item{
  background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:12px 14px;display:flex;justify-content:space-between;align-items:center;
}
.hist-item .htxt strong{font-family:var(--font-display);font-size:.92rem;text-transform:uppercase;display:block;}
.hist-item .htxt span{font-size:.75rem;color:var(--ink-soft);}
.hist-item .hdur{font-size:.78rem;color:var(--ink-soft);font-weight:600;}
.hist-empty{
  text-align:center;color:var(--ink-faint);font-size:.85rem;padding:30px 10px;
}

/* ---------- BOTTOM NAV ---------- */
.bottomnav{
  position:fixed;left:0;right:0;bottom:0;
  max-width:480px;margin:0 auto;
  background:rgba(33,37,44,.92);backdrop-filter:blur(10px);
  border-top:1px solid var(--line);
  display:flex;padding:8px 0 calc(8px + var(--safe-bottom));
  z-index:30;
}
.navbtn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;color:var(--ink-faint);padding:6px 0;
  font-size:.66rem;font-family:var(--font-display);letter-spacing:.1em;text-transform:uppercase;font-weight:600;
}
.navbtn.active{color:var(--work);}
.navbtn svg{width:21px;height:21px;}

/* ---------- TRANSITION / CONFIRM MODALS ---------- */
.modal-overlay{
  position:fixed;inset:0;z-index:80;background:rgba(10,12,15,.7);
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.modal-card{
  background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px;max-width:340px;width:100%;text-align:center;
}
.modal-card h3{font-size:1.1rem;text-transform:uppercase;margin-bottom:8px;}
.modal-card p{font-size:.85rem;color:var(--ink-soft);margin-bottom:18px;}
.modal-actions{display:flex;gap:10px;}
.modal-actions .btn{flex:1;justify-content:center;}

/* Transition between blocks */
.transition-screen{
  position:fixed;inset:0;z-index:55;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:32px;gap:10px;max-width:480px;margin:0 auto;
}
.transition-screen .eyebrow{margin-bottom:6px;}
.transition-screen h1{font-size:1.9rem;text-transform:uppercase;margin-bottom:6px;}
.transition-screen .info{font-size:.9rem;color:var(--ink-soft);margin-bottom:18px;}

.hidden{display:none !important;}
</style>
</head>

function pad2(n){ return n.toString().padStart(2,'0'); }
function fmtTime(s){
  s = Math.max(0, Math.round(s));
  return pad2(Math.floor(s/60)) + ':' + pad2(s%60);
}
function fmtDuration(min){
  if(min < 60) return min + ' min';
  const h = Math.floor(min/60), m = min%60;
  return h + 'h' + (m? ' ' + pad2(m) + 'min' : '');
}
function ytThumb(url){
  if(!url) return '';
  const m = url.match(/(?:shorts\/|watch\?v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
  return m ? `https://img.youtube.com/vi/${m[1]}/hqdefault.jpg` : '';
}
function exImg(nome){
  return EXERCISE_IMG[nome] || '';
}
function isoDate(d=new Date()){
  const y=d.getFullYear(), m=pad2(d.getMonth()+1), day=pad2(d.getDate());
  return `${y}-${m}-${day}`;
}
function startOfWeek(d=new Date()){
  const date = new Date(d);
  const day = (date.getDay()+6)%7; // segunda=0
  date.setDate(date.getDate()-day);
  date.setHours(0,0,0,0);
  return date;
}

/* =========================================================
   ÁUDIO / VIBRAÇÃO
   ========================================================= */
let audioCtx = null;
function beep(freq=880, dur=0.12, vol=0.18){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    o.stop(audioCtx.currentTime + dur + 0.02);
  }catch(e){}
}
function vibrate(pattern){
  try{ if(navigator.vibrate) navigator.vibrate(pattern); }catch(e){}
}
function tickSound(){ beep(660,0.08,0.12); }
function transitionSound(){ beep(990,0.18,0.2); vibrate([0,140]); }
function finishSound(){ beep(1200,0.12,0.22); setTimeout(()=>beep(1500,0.18,0.22),140); vibrate([0,120,80,200]); }

let wakeLock = null;
async function requestWakeLock(){
  try{ if('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); }catch(e){}
}
function releaseWakeLock(){
  try{ if(wakeLock) wakeLock.release(); wakeLock=null; }catch(e){}
}

/* =========================================================
   CONSTRUÇÃO DOS PASSOS (lista linear navegável)
   ========================================================= */
function buildSteps(treinoKey){
  const t = PLANO[treinoKey];
  const steps = [];

  // --- Aquecimento ---
  t.aquecimento.forEach(it=>{
    steps.push({
      bloco:'Aquecimento', ronda:null, totalRondas:null,
      nome:it.nome, detalhe:it.detalhe, tipo:it.tipo, duracao:it.duracao,
      video:it.video, fase:'work', isRest:false,
    });
  });

  // --- Circuitos ---
  t.circuitos.forEach(circuito=>{
    const isTabata = circuito.exercicios.some(ex=>ex.tipo==='tabata');
    if(isTabata){
      // Treino em casa: bloco contínuo único por circuito
      const fases = [];
      for(let ronda=1; ronda<=circuito.rondas; ronda++){
        circuito.exercicios.forEach((ex, idx)=>{
          fases.push({
            nome:ex.nome, detalhe:ex.detalhe, duracao:40,
            video:ex.video, fase:'work', isRest:false,
            ronda, totalRondas:circuito.rondas,
          });
          const isUltimoExDaRonda = idx === circuito.exercicios.length-1;
          if(!(isUltimoExDaRonda && ronda < circuito.rondas)){
            fases.push({
              nome:'Descanso', detalhe:'Prepara o próximo exercício', duracao:20,
              video:null, fase:'rest', isRest:true,
              proximo:proximoNomeTabata(circuito.exercicios, ex),
              ronda, totalRondas:circuito.rondas,
            });
          }
        });
        if(ronda < circuito.rondas){
          fases.push({
            nome:'Descanso entre Rondas', detalhe:`Próxima: Ronda ${ronda+1} de ${circuito.rondas}`,
            duracao:circuito.descansoRonda, video:null, fase:'rest', isRest:true,
            proximo:circuito.exercicios[0].nome,
            ronda, totalRondas:circuito.rondas,
          });
        }
      }
      attachOffsets(fases);
      const duracaoTotal = fases.reduce((a,f)=>a+f.duracao,0);
      steps.push({
        bloco:circuito.nome, tipo:'bloco-continuo', duracaoTotal, fases,
        totalRondas:circuito.rondas,
      });
    } else {
      // Treino 1/2
      for(let ronda=1; ronda<=circuito.rondas; ronda++){
        circuito.exercicios.forEach(ex=>{
          steps.push({
            bloco:circuito.nome, ronda, totalRondas:circuito.rondas,
            nome:ex.nome, detalhe:ex.detalhe, tipo:ex.tipo, duracao:ex.duracao||null,
            video:ex.video, peso:ex.peso||false, fase:'work', isRest:false,
          });
        });
        if(ronda < circuito.rondas && circuito.descansoRonda){
          steps.push({
            bloco:circuito.nome, ronda, totalRondas:circuito.rondas,
            nome:'Descanso entre Rondas', detalhe:`Próxima: Ronda ${ronda+1} de ${circuito.rondas}`,
            tipo:'timer', duracao:circuito.descansoRonda, video:null, fase:'rest', isRest:true,
          });
        }
      }
    }
  });

  return steps;
}

function proximoNomeTabata(lista, atual){
  const idx = lista.indexOf(atual);
  return idx < lista.length-1 ? lista[idx+1].nome : null;
}

// Pré-calcula o offset (segundos desde o início do bloco) de cada fase
function attachOffsets(fases){
  let acc = 0;
  fases.forEach(f=>{ f.offset = acc; acc += f.duracao; });
  return fases;
}

// Dado o tempo restante total de um bloco contínuo, descobre em que fase estamos
function computeFaseInfo(step, remaining){
  const elapsed = step.duracaoTotal - remaining;
  const fases = step.fases;
  for(let i=0; i<fases.length; i++){
    const f = fases[i];
    const end = f.offset + f.duracao;
    if(elapsed < end || i === fases.length-1){
      return { index:i, fase:f, remainingInFase: Math.max(0, end-elapsed) };
    }
  }
}

// Índices em que se inicia um novo "bloco" -> usados para mostrar tela de transição
function blockStartIndices(steps){
  const idxs = [];
  let lastKey = null;
  steps.forEach((s,i)=>{
    const key = s.bloco + '|' + (s.ronda===1 || s.ronda===null ? '1' : '0');
    if(s.bloco !== (steps[i-1]?.bloco) ){
      idxs.push(i);
    }
  });
  return idxs;
}

/* ---------- HOME ---------- */
function renderHome(){
  const lista = getHistorico();
  const semanaInicio = startOfWeek();
  const treinosSemana = lista.filter(s=> new Date(s.data) >= semanaInicio).length;
  const dotsMeta = 5;

  let dots = '';
  for(let i=0;i<dotsMeta;i++){
    dots += `<div class="week-dot ${i<treinosSemana?'done':''}">${i<treinosSemana?ICON.check:''}</div>`;
  }

  let cards = '';
  Object.values(PLANO).forEach(t=>{
    const ultimos = lista.filter(s=>s.treino===t.chave).sort((a,b)=> new Date(b.data)-new Date(a.data));
    const ultima = ultimos[0];
    let ultimaTxt = 'Ainda não realizado';
    if(ultima){
      const d = new Date(ultima.data);
      const hojeStr = isoDate(), ontemStr = isoDate(new Date(Date.now()-86400000));
      if(ultima.data===hojeStr) ultimaTxt = 'Feito hoje';
      else if(ultima.data===ontemStr) ultimaTxt = 'Feito ontem';
      else ultimaTxt = 'Última vez: ' + d.toLocaleDateString('pt-PT',{day:'numeric',month:'short'});
    }
    cards += `
      <div class="wcard" onclick="openDetail('${t.chave}')">
        <div class="wcard-top">
          <h2>${t.nome}</h2>
        </div>
        <div class="wcard-meta">${t.descricao}</div>
        <div class="wcard-focus">
          ${t.foco.map(f=>`<span class="tag">${f}</span>`).join('')}
        </div>
        <div class="wcard-foot">
          <span class="wcard-last">${ultimaTxt}</span>
          <button class="btn" onclick="event.stopPropagation();startExec('${t.chave}')">${ICON.play} Começar</button>
        </div>
      </div>
    `;
  });

  return `
    <div class="week-card">
      <div class="wtxt">
        <div class="eyebrow">Esta semana</div>
        <strong>${treinosSemana} de ${dotsMeta} treinos</strong>
      </div>
      <div class="week-dots">${dots}</div>
    </div>
    <div class="section-title">Treinos</div>
    ${cards}
  `;
}

function renderHistory(){
  const lista = getHistorico();
  const total = lista.length;
  const esteMes = lista.filter(s=>{
    const d = new Date(s.data);
    return d.getMonth()===new Date().getMonth() && d.getFullYear()===new Date().getFullYear();
  }).length;
  const sequencia = calcSequenciaSemanas(lista);

  return `
    <div class="detail-head" style="padding-top:calc(20px + var(--safe-top))">
      <h1>Histórico</h1>

      <div class="stat-card"><div class="v">${total}</div><div class="l">Treinos</div></div>
      <div class="stat-card"><div class="v">${sequencia}</div><div class="l">Sem. seguidas</div></div>
      <div class="stat-card"><div class="v">${esteMes}</div><div class="l">Este Mês</div></div>
    </div>
    ${renderCalendar(lista)}
    <div class="section-title">Sessões recentes</div>
    ${renderHistList(lista)}
    <div style="text-align:center;margin-top:28px;padding-bottom:24px">
      <button onclick="confirmReset()" style="background:none;border:none;color:var(--ink-soft);font-size:13px;text-decoration:underline;padding:8px">Limpar histórico e pesos guardados</button>
    </div>
  `;
}

function calcSequenciaSemanas(lista){
  if(!lista.length) return 0;
  let streak = 0;
  let cursor = startOfWeek();
  while(true){
    const fimSemana = new Date(cursor); fimSemana.setDate(fimSemana.getDate()+7);
    const temTreino = lista.some(s=>{
      const d = new Date(s.data);
      return d >= cursor && d < fimSemana;
    });
    if(!temTreino) break;
    streak++;
    cursor.setDate(cursor.getDate()-7);
  }
  return streak;
}

function renderCalendar(lista){
  const ref = state.histMonth;
  const year = ref.getFullYear(), month = ref.getMonth();
  const first = new Date(year, month, 1);
  const startOffset = (first.getDay()+6)%7; // segunda=0
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayStr = isoDate();

  const countByDay = {};
  lista.forEach(s=>{
    const d = new Date(s.data);
    if(d.getFullYear()===year && d.getMonth()===month){
      countByDay[d.getDate()] = (countByDay[d.getDate()]||0)+1;
    }
  });

  let cells = '';
  for(let i=0;i<startOffset;i++) cells += `<div class="cal-day empty"></div>`;
  for(let day=1; day<=daysInMonth; day++){
    const dateStr = isoDate(new Date(year,month,day));
    const cnt = countByDay[day]||0;
    let cls = 'cal-day';
    if(dateStr===todayStr) cls += ' today';
    if(cnt===1) cls += ' has-1';
    if(cnt>=2) cls += ' has-2';
    cells += `<div class="${cls}">${day}</div>`;
  }

  const label = MESES[month] + ' ' + year;

  return `
    <div class="cal-card">
      <div class="cal-head">
        <div class="lbl">${label}</div>
        <div class="cal-nav">
          <button onclick="changeMonth(-1)">${ICON.chevL}</button>
          <button onclick="changeMonth(1)">${ICON.chevR}</button>
        </div>
      </div>
      <div class="cal-grid">
        ${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>
  `;
}

function changeMonth(delta){
  const d = new Date(state.histMonth);
  d.setMonth(d.getMonth()+delta);
  state.histMonth = d;
  render();
}

function renderHistList(lista){
  if(!lista.length){
    return `<div class="hist-empty">Ainda sem treinos registados.<br>Conclui o teu primeiro treino para começar o histórico.</div>`;
  }
  const ordenada = [...lista].sort((a,b)=> new Date(b.data+'T'+(b.hora||'00:00')) - new Date(a.data+'T'+(a.hora||'00:00')));
  return `<div class="hist-list">
    ${ordenada.slice(0,30).map(s=>{
      const d = new Date(s.data);
      const dataTxt = d.toLocaleDateString('pt-PT',{weekday:'short', day:'numeric', month:'short'});
      return `
        <div class="hist-item">
          <div class="htxt">
            <strong>${PLANO[s.treino]?.nome||s.treino}</strong>
            <span>${dataTxt}</span>
          </div>
          <div class="hdur">${fmtDuration(s.duracaoMin)}</div>
        </div>
      `;
    }).join('')}
  </div>`;
}

/* =========================================================
   EXECUÇÃO — MOTOR
   ========================================================= */
function curStep(){ return exec.steps[exec.index]; }

function blocoLabel(step, d){
  if(d.totalRondas) return `${step.bloco} · Ronda ${d.ronda} de ${d.totalRondas}`;
  return step.bloco;
}

function startExec(treinoKey){
  exec.active = true;
  exec.treinoKey = treinoKey;
  exec.steps = buildSteps(treinoKey);
  exec.index = 0;
  exec.startedAt = Date.now();
  exec.timer = { remaining:0, total:0, running:false, id:null, fase:'work' };
  exec.pesosAnteriores = getPesos();
  exec.pesos = {...exec.pesosAnteriores};
  requestWakeLock();
  showTransition(true); // transição inicial
}

function showTransition(isStart=false){
  clearTimerInterval();
  const step = curStep();
  exec.pendingTransition = {
    isStart,
    titulo: step.bloco,
    info: step.totalRondas ? `${step.totalRondas} rondas` : (isStart ? 'Vamos começar!' : 'Próximo bloco'),
  };
  renderExecLayer();
}

function confirmTransition(){
  exec.pendingTransition = null;
  goToStep(exec.index);
}

function goToStep(i){
  clearTimerInterval();
  exec.index = i;
  exec.pendingTransition = null;
  const step = curStep();
  if(step.tipo === 'timer'){
    exec.timer = { remaining:step.duracao, total:step.duracao, running:false, id:null, fase:step.fase };
  } else if(step.tipo === 'bloco-continuo'){
    exec.timer = { remaining:step.duracaoTotal, total:step.duracaoTotal, running:false, id:null, fase:step.fases[0].fase, _lastFaseIndex:0 };
  } else {
    exec.timer = { remaining:0, total:0, running:false, id:null, fase:step.fase };
  }
  renderExecLayer();
}

/* ---- Timer ---- */
function clearTimerInterval(){
  if(exec.timer.id){ clearInterval(exec.timer.id); exec.timer.id=null; }
}
function startTimer(seconds, fase){
  exec.timer = { remaining:seconds, total:seconds, running:true, id:null, fase };
  exec.timer.id = setInterval(tickTimer, 1000);
}
function tickTimer(){
  exec.timer.remaining--;
  const step = curStep();
  if(step.tipo === 'bloco-continuo'){
    const info = computeFaseInfo(step, exec.timer.remaining);
    if(info.remainingInFase <= 3 && info.remainingInFase > 0){
      tickSound();
    }
    if(info.index !== exec.timer._lastFaseIndex){
      transitionSound();
      exec.timer._lastFaseIndex = info.index;
    }
  } else {
    if(exec.timer.remaining <= 3 && exec.timer.remaining > 0){
      tickSound();
    }
  }
  if(exec.timer.remaining <= 0){
    clearTimerInterval();
    transitionSound();
    renderExecLayer();
    setTimeout(()=>{ if(exec.active) nextStep(); }, 350);
    return;
  }
  renderExecLayer();
}
function togglePause(){
  if(!exec.active) return;
  const step = curStep();
  if(step.tipo !== 'timer' && step.tipo !== 'bloco-continuo') return;
  if(exec.timer.running){
    exec.timer.running = false;
    clearTimerInterval();
  } else {
    exec.timer.running = true;
    exec.timer.id = setInterval(tickTimer, 1000);
  }
  renderExecLayer();
}

/* ---- Navegação ---- */
function _advanceToNextEntry(){
  clearTimerInterval();
  if(exec.index >= exec.steps.length-1){
    finishWorkout();
    return;
  }
  const novo = exec.index+1;
  if(exec.steps[novo].bloco !== exec.steps[exec.index].bloco){
    exec.index = novo;
    showTransition(false);
  } else {
    goToStep(novo);
  }
}
function _advanceToPrevEntry(){
  if(exec.index<=0) return;
  clearTimerInterval();
  goToStep(exec.index-1);
}
function avancarFaseBloco(dir){
  const step = curStep();
  const info = computeFaseInfo(step, exec.timer.remaining);
  const novoIndex = info.index + dir;
  if(novoIndex < 0){
    _advanceToPrevEntry();
    return;
  }
  if(novoIndex >= step.fases.length){
    _advanceToNextEntry();
    return;
  }
  exec.timer.remaining = step.duracaoTotal - step.fases[novoIndex].offset;
  exec.timer._lastFaseIndex = novoIndex;
  renderExecLayer();
}
function nextStep(){
  if(!exec.active) return;
  const step = curStep();
  if(step.tipo === 'bloco-continuo'){
    avancarFaseBloco(1);
    return;
  }
  _advanceToNextEntry();
}
function prevStep(){
  if(!exec.active) return;
  const step = curStep();
  if(step.tipo === 'bloco-continuo'){
    avancarFaseBloco(-1);
    return;
  }
  if(exec.index<=0) return;
  _advanceToPrevEntry();
}
function markDone(){
  nextStep();
}

function ajustarPeso(delta){
  const step = curStep();
  if(!step.peso) return;
  const atual = exec.pesos[step.nome] ?? 0;
  const novo = Math.max(0, Math.round((atual+delta)*2)/2);
  exec.pesos[step.nome] = novo;
  savePesos(exec.pesos);
  renderExecLayer();
}
function definirPeso(valorStr){
  const step = curStep();
  if(!step.peso) return;
  let v = parseFloat(String(valorStr).replace(',','.'));
  if(isNaN(v) || v<0) v = 0;
  v = Math.round(v*2)/2;
  exec.pesos[step.nome] = v;
  savePesos(exec.pesos);
  renderExecLayer();
}

/* ---- Sair ---- */
function confirmExit(){
  exec.showExitModal = true;
  renderExecLayer();
}
function closeExitModal(){
  exec.showExitModal = false;
  renderExecLayer();
}
function exitExec(save){
  clearTimerInterval();
  releaseWakeLock();
  if(save){
    const passosFeitos = exec.index;
    if(passosFeitos > 0){
      addSessao({
        treino: exec.treinoKey,
        data: isoDate(),
        hora: new Date().toTimeString().slice(0,5),
        duracaoMin: Math.max(1, Math.round((Date.now()-exec.startedAt)/60000)),
        completo: false,
      });
    }
  }
  exec.active = false;
  exec.showExitModal = false;
  document.getElementById('execLayer').innerHTML = '';
  state.view = 'home';
  render();
}

/* ---- Concluir treino ---- */
function finishWorkout(){
  clearTimerInterval();
  releaseWakeLock();
  const duracaoMin = Math.max(1, Math.round((Date.now()-exec.startedAt)/60000));
  const numExercicios = exec.steps.reduce((acc,s)=>{
    if(s.bloco==='Aquecimento' || s.bloco==='Arrefecimento') return acc;
    if(s.tipo==='bloco-continuo') return acc + s.fases.filter(f=>!f.isRest).length;
    return acc + (s.isRest ? 0 : 1);
  }, 0);
  addSessao({
    treino: exec.treinoKey,
    data: isoDate(),
    hora: new Date().toTimeString().slice(0,5),
    duracaoMin,
    completo: true,
  });
  exec.doneStats = { duracaoMin, numExercicios };
  exec.showDone = true;
  renderExecLayer();
}
function closeDone(){
  exec.active = false;
  exec.showDone = false;
  document.getElementById('execLayer').innerHTML = '';
  state.view = 'home';
  render();
}

/* ---- RENDER da camada de execução ---- */
function renderExecLayer(){
  const layer = document.getElementById('execLayer');
  if(!exec.active){ layer.innerHTML=''; return; }

  if(exec.showDone){
    layer.innerHTML = renderDoneScreen();
    return;
  }
  if(exec.pendingTransition){
    layer.innerHTML = renderTransitionScreen();
    if(exec.showExitModal) layer.innerHTML += renderExitModal();
    return;
  }

  const step = curStep();
  const total = exec.steps.length;
  const pct = Math.round(((exec.index+1)/total)*100);
  const isBloco = step.tipo === 'bloco-continuo';
  const isTimer = step.tipo === 'timer' || isBloco;

  let d = step, info = null, faseRemaining = exec.timer.remaining, faseTotal = exec.timer.total;
  if(isBloco){
    info = computeFaseInfo(step, exec.timer.remaining);
    d = info.fase;
    faseRemaining = info.remainingInFase;
    faseTotal = d.duracao;
  }
  const fase = d.fase;

  let centerHtml = '';
  const notStarted = isTimer && !exec.timer.running && exec.timer.remaining === exec.timer.total;
  if(isTimer){
    const r = 90, circ = 2*Math.PI*r;
    const ratio = faseTotal>0 ? faseRemaining/faseTotal : 0;
    const offset = circ * (1-ratio);
    const faseTxt = fase==='rest' ? 'Descanso' : 'Trabalho';
    const statusTxt = notStarted ? '' : (!exec.timer.running ? ' · Pausado' : '');
    centerHtml = `
      <div class="ring-wrap">
        <svg viewBox="0 0 200 200">
          <circle class="ring-bg" cx="100" cy="100" r="${r}"/>
          <circle class="ring-fg ${fase}" cx="100" cy="100" r="${r}"
            stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
        </svg>
        <div class="ring-center">
          <div class="ring-time">${fmtTime(faseRemaining)}</div>
          <div class="ring-sub">${faseTxt}${statusTxt}</div>
        </div>
      </div>
    `;
  } else {
    centerHtml = `
      <div class="reps-wrap">
        <div class="reps-num">${d.detalhe.split(' ')[0]}</div>
        <div class="reps-sub">${d.detalhe.replace(d.detalhe.split(' ')[0],'').trim()||'repetições'}</div>
      </div>
      <div class="note-box">Faz ao teu ritmo e toca em <strong>Feito</strong> quando terminares.</div>
    `;
  }

  let roundDots = '';
  if(d.totalRondas && d.totalRondas <= 10 && step.bloco!=='Arrefecimento'){
    for(let r=1;r<=d.totalRondas;r++){
      let cls='dot';
      if(r<d.ronda) cls+=' done';
      else if(r===d.ronda) cls += ' active' + (fase==='rest'?' rest':'');
      roundDots += `<div class="${cls}"></div>`;
    }
    roundDots = `<div class="round-marks">${roundDots}</div>`;
  }

  const restTag = d.isRest ? `<div class="phase-tag rest">Descanso</div>` : '';
  let illustration = exImg(d.nome);
  let illustrationAlt = d.nome;
  if(!illustration && d.isRest && d.proximo){
    illustration = exImg(d.proximo);
    illustrationAlt = d.proximo;
  }
  const illustrationHtml = illustration ? `<div class="ex-illustration"><img src="${illustration}" alt="${illustrationAlt}"/></div>` : '';
  const videoHtml = d.video ? `<a class="video-link" href="${d.video}" target="_blank" rel="noopener">${ICON.video} Ver técnica</a>` : '';
  let pesoHtml = '';
  if(d.peso){
    const atual = exec.pesos[d.nome] ?? 0;
    const anterior = exec.pesosAnteriores[d.nome];
    pesoHtml = `
      <div class="peso-card">
        <div class="peso-label">Peso de hoje</div>
        <div class="peso-row">
          <button class="peso-btn" onclick="ajustarPeso(-1)" aria-label="Diminuir peso">−</button>
          <div class="peso-val">
            <input type="number" inputmode="decimal" step="0.5" min="0" value="${atual}" onchange="definirPeso(this.value)"/>
            <span class="peso-unit">kg</span>
          </div>
          <button class="peso-btn" onclick="ajustarPeso(1)" aria-label="Aumentar peso">+</button>
        </div>
        ${anterior!==undefined ? `<div class="peso-prev">Última vez: ${anterior}kg</div>` : ''}
      </div>
    `;
  }
  const proximoNote = (d.isRest && d.proximo) ? `<div class="note-box">A seguir: <strong>${d.proximo}</strong></div>` : '';
  const rondaNote = (d.isRest && d.detalhe && !d.proximo && step.bloco!=='Arrefecimento') ? `<div class="note-box">${d.detalhe}</div>` : '';

  let midBtn;
  if(isTimer){
    const label = exec.timer.running ? 'Pausar' : (notStarted ? 'Começar' : 'Continuar');
    const icon = exec.timer.running ? ICON.pause : ICON.play;
    midBtn = `<button class="ctrl-btn main${notStarted?' start':''}" onclick="togglePause()">${icon}<span>${label}</span></button>`;
  } else {
    midBtn = `<button class="ctrl-btn main" onclick="markDone()">${ICON.check}<span>Feito</span></button>`;
  }

  const stepCountHtml = isBloco ? fmtTime(exec.timer.remaining) : `${exec.index+1}/${total}`;
  const isLastFase = exec.index===total-1 && (!isBloco || info.index===step.fases.length-1);

  layer.innerHTML = `
    <div class="exec-screen phase-${fase}">
      <div class="exec-top">
        <button class="icon-btn" onclick="confirmExit()">${ICON.close}</button>
        <div class="exec-progress"><div class="exec-progress-fill" style="width:${pct}%;${fase==='rest'?'background:var(--rest)':''}"></div></div>
        <div class="exec-step-count">${stepCountHtml}</div>
      </div>
      <div class="exec-body">
        <div class="exec-label">${blocoLabel(step, d)}</div>
        ${restTag}
        <h1 class="exec-name">${d.nome}</h1>
        ${illustrationHtml}
        ${centerHtml}
        ${pesoHtml}
        ${roundDots}
        ${proximoNote}${rondaNote}
        ${videoHtml}
      </div>
      <div class="exec-controls">
        <button class="ctrl-btn" onclick="prevStep()" ${exec.index===0?'disabled':''}>${ICON.prev}<span>Anterior</span></button>
        ${midBtn}
        <button class="ctrl-btn" onclick="nextStep()">${ICON.next}<span>${isLastFase?'Terminar':'Saltar'}</span></button>
      </div>
    </div>
    ${exec.showExitModal ? renderExitModal() : ''}
  `;
}

function renderTransitionScreen(){
  const t = exec.pendingTransition;
  const treino = PLANO[exec.treinoKey];
  return `
    <div class="transition-screen">
      <div class="eyebrow">${t.isStart ? treino.nome : 'A seguir'}</div>
      <h1>${t.titulo}</h1>
      <div class="info">${t.info}</div>
      <button class="btn btn-block" onclick="confirmTransition()">${ICON.play} ${t.isStart?'Vamos lá':'Pronto'}</button>
      <button class="btn btn-ghost btn-block" style="margin-top:10px" onclick="confirmExit()">Sair</button>
    </div>
  `;
}

function renderExitModal(){
  return `
    <div class="modal-overlay">
      <div class="modal-card">
        <h3>Sair do Treino?</h3>
        <p>Podes guardar o progresso desta sessão ou sair sem guardar.</p>
        <div class="modal-actions" style="flex-direction:column">
          <button class="btn btn-ghost btn-block" onclick="closeExitModal()">Continuar Treino</button>
          <button class="btn btn-rest btn-block" onclick="exitExec(true)">Terminar e Guardar</button>
          <button class="btn btn-ghost btn-block" style="color:var(--warn);border-color:var(--warn)" onclick="exitExec(false)">Sair sem Guardar</button>
        </div>
      </div>
    </div>
  `;
}

/* ---- Limpar histórico e pesos ---- */
function confirmReset(){
  state.showResetModal = true;
  render();
}
function closeResetModal(){
  state.showResetModal = false;
  render();
}
function resetTudo(){
  try{ localStorage.removeItem(LS_KEY); }catch(e){}
  try{ localStorage.removeItem(LS_PESOS); }catch(e){}
  state.showResetModal = false;
  state.histMonth = new Date();
  render();
}
function renderResetModal(){
  return `
    <div class="modal-overlay">
      <div class="modal-card">
        <h3>Limpar histórico e pesos?</h3>
        <p>Apaga todas as sessões guardadas e os pesos registados. Não pode ser desfeito.</p>
        <div class="modal-actions" style="flex-direction:column">
          <button class="btn btn-ghost btn-block" onclick="closeResetModal()">Cancelar</button>
          <button class="btn btn-ghost btn-block" style="color:var(--warn);border-color:var(--warn)" onclick="resetTudo()">Limpar Tudo</button>
        </div>
      </div>
    </div>
  `;
}

function renderDoneScreen(){
  const s = exec.doneStats;
  const treino = PLANO[exec.treinoKey];
  return `
    <div class="done-screen">
      <div class="big-check">${ICON.bigcheck}</div>
      <h1>Treino Concluído!</h1>
      <p style="color:var(--ink-soft)">${treino.nome} — bom trabalho, Nuno.</p>
      <div class="done-stats">
        <div class="done-stat"><div class="v">${s.duracaoMin}</div><div class="l">Minutos</div></div>
        <div class="done-stat"><div class="v">${s.numExercicios}</div><div class="l">Exercícios</div></div>
      </div>
      <button class="btn btn-block" onclick="closeDone()">Concluir</button>
    </div>
  `;
}

/* =========================================================
   INIT
   ========================================================= */
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='visible' && exec.active) requestWakeLock();
});

render();



</script>
</body>
</html>
